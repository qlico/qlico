version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    open-pull-requests-limit: 5
    rebase-strategy: auto
    labels: ["dependencies"]
    schedule:
      interval: daily
    cooldown:
      default-days: 7

  - package-ecosystem: docker
    directory: "/project-examples"
    open-pull-requests-limit: 5
    rebase-strategy: auto
    labels: ["dependencies"]
    schedule:
      interval: daily
    cooldown:
      default-days: 7

  - package-ecosystem: github-actions
    directory: "/"
    open-pull-requests-limit: 5
    rebase-strategy: auto
    labels: ["dependencies"]
    schedule:
      interval: daily
    cooldown:
      default-days: 7
